    <h3>Menu</h3>
    <button class="close-sidebar-btn" (click)="closeSidebar()">×</button>
  </div>

  <nav class="sidebar-nav">
    <ul>
      <li><a routerLink="/dashboard" (click)="closeSidebar()">Accueil</a></li>

      <li><a routerLink="/projets" (click)="closeSidebar()">Projets</a></li>

  </nav>

</div>
